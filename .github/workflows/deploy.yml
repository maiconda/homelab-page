name: Homelab CI/CD

on:
  push:
    branches:
      - main

jobs:
  # Part 1: Build the image in the Cloud (GitHub-hosted runner)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/homelab-dashboard:latest
          # Use cache to make subsequent builds faster
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/homelab-dashboard:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/homelab-dashboard:buildcache,mode=max

  # Part 2: Deploy on your local server (Self-hosted runner)
  deploy:
    needs: build
    runs-on: self-hosted # This tells GitHub to run this job on your server
    steps:
      - name: Pull new image and restart container
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/homelab-dashboard:latest
          docker stop homelab-page || true
          docker rm homelab-page || true
          docker run -d \
            --name homelab-page \
            -p 2411:2411 \
            --restart always \
            ${{ secrets.DOCKER_USERNAME }}/homelab-dashboard:latest
          docker image prune -f
